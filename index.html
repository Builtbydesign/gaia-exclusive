<!DOCTYPE html>

    <style>
        @font-face {
            font-family: "Montserrat-ExtraLight";
            src: url("font/Montserrat-ExtraLight.woff") format("woff");
            font-weight: light;
            font-style: normal;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: "Montserrat-ExtraLight", sans-serif;
            color: #fff;
            min-height: 100vh;
            background: #5D2B16 url(concrete.jpg) center top repeat-y;
            background-blend-mode: multiply;
            background-size: cover;
        }
        
        a {
            color: #fff;
            text-underline-offset: .2em;
            text-decoration: none;
        }
        
        a:hover, a:focus {
            color: #fffccc;
            text-decoration: underline;
        }
        
        li { list-style: none; }
        
        #nav {
            text-align: center;
            padding: 1rem;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 99;
        }
        
        #nav ul {
            display: flex;
            justify-content: space-around;
            line-height: 30px;
            font-size: 0.9em;
        }
        
        #nav a { padding: 15px; }
        
        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            padding: 0;
            margin: 0;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
        }
        
        #header {
            width: 300px;
        }
        
        #logo {
            display: block;
            margin-bottom: 1.5rem;
        }
        
        #logo svg {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,.5));
            transition: all 0.2s ease;
        }
        
        #logo:hover svg {
            filter: sepia(100%) drop-shadow(3px 3px 9px rgba(0,0,0,.8));
        }
        
        #places {
            text-align: right;
            line-height: 2em;
            display: block;
            margin-right: 50px;
        }
        
        #content {
            width: 100%;
            margin: 2rem auto;
            padding: 0 25px;
        }

        #content img {
            max-width: 100%;
            margin: 0.5em 0 0.5em 0;
        }
        
        #footer {
            text-align: center;
            margin: 2rem auto;
            font-size: 80%;
            opacity: 0.6;
        }
        
        #footer:before {
            content: '-';
            display: block;
            margin-bottom: 0.5rem;
        }
        
        @media (min-width: 640px) {

<body>

    <div class="container">
        <div id="header">

            <ul id="places">
                <li><a href="#!the_fort">The Fort</a></li>

    <div id="content"></div>

    <div id="footer">
        <p>copyright & legal</p>
    </div>

    <script src="js/marked.js"></script>
    <script>
        let current = null;
        const cache = {};

        document.addEventListener('click', e => {
            const link = e.target.closest('a');
            if (!link) return;
            
            const href = link.getAttribute('href');
            if (href && href.startsWith('#!')) {
                e.preventDefault();
                go(href.substring(2));
            }
        });

        window.addEventListener('popstate', () => {
            go(location.hash.substring(2) || 'home', false);
        });

        async function go(page, push = true) {
            if (page === current) return;
            current = page;
            document.getElementById('content').innerHTML = await load(page);
            document.body.className = page;
            if (push) history.pushState(null, '', `#!${page}`);
        }

        async function load(page) {
            if (cache[page]) return cache[page];
            try {
                const res = await fetch(`pages/${page}.md`);
                if (!res.ok) throw new Error();
                let text = await res.text();
                return cache[page] = marked(text.replace(/^---[\s\S]*?---\n/, ''));
            } catch {
                return cache[page] = marked(`# 404\n\nPage not found. [Home](#!home).`);
            }
        }

        go(location.hash.substring(2) || 'home', false);
    </script>
